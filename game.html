<!DOCTYPE html>
<html>
<head>
<title>Game</title>
<style>
body{margin:0;}

.box{
  position:relative;
  height:100vh;
}

.box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:black;
  font-size:35px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <img src="img1.jpg">
  <div class="text">Game Loading...</div>
</div>

</body>
</html>
