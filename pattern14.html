<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern</title>
</head>
<body>
    <script>
let n=4;

for(let i=1;i<=n;i++){
let row="";
let ch=String.fromCharCode(64+i);

for(let j=1;j<=i;j++){
row+=ch+" ";
}

console.log(row);
}
    </script>
</body>
</html>
