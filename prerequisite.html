<!DOCTYPE html>
<html>
<head>
    <title>Subway Surfers</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        body {
            background: url("subway-surfers.jpg") no-repeat center center;
            background-size: cover;
            position: relative;
            color: white;
        }
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .play-btn {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 25px;
            background: rgb(221, 174, 36);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .play-btn:hover {
            background: rgb(255, 165, 0);
            color: white;
        }

        .bottom-menu {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
        }

        .bottom-menu button {
            margin: 0 25px;
            padding: 12px 25px;
            font-size: 18px;
            background: orange;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .bottom-menu button:hover {
            background: red;
            color: black;
        }

    </style>
</head>

<body>

    <div class="content">

      
        <button class="play-btn" onclick="window.location.href='game.html'">
            Tap to Play
        </button>


        <div class="bottom-menu">
            <button onclick="alert('Friends Section Opened')">Friends</button>
            <button onclick="alert('Profile Opened')">Me</button>
            <button onclick="alert('Shop Opened')">Shop</button>
        </div>

    </div>

</body>
</html>
