<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1 - Grade Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input {
            padding: 8px;
            width: 80%;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Grade Calculator</h2>

    <p>Enter number of subjects:</p>
    <input type="number" id="subjects" placeholder="e.g. 5">

    <br>

    <button onclick="calculateResult()">Calculate Result</button>

    <div id="result"></div>
</div>

<script src="EXPERIMENT_01.js"></script>

</body>
</html>
